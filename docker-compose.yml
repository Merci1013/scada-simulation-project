services:
  mongodb:
    image: mongo:7
    container_name: scada-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: scada-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
  node-red:
    image: nodered/node-red
    container_name: scada-node-red
    ports:
    - "1880:1880"
    volumes:
    - ./node-red/data:/data

volumes:
  mongodb_data: