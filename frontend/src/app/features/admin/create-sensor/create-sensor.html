<div class="create-sensor-page">
  <h2>Créer un capteur</h2>

  <form [formGroup]="sensorForm" (ngSubmit)="onSubmit()" class="sensor-form">
    <label>
      Sensor ID
      <input type="text" formControlName="sensorId" />
    </label>

    <label>
      Nom
      <input type="text" formControlName="name" />
    </label>

    <label>
      Topic
      <select formControlName="topic">
        <option value="scada/temperature">scada/temperature</option>
        <option value="scada/humidity">scada/humidity</option>
        <option value="scada/pressure">scada/pressure</option>
        <option value="scada/level">scada/level</option>
      </select>
    </label>

    <label>
      Type
      <input type="text" formControlName="type" />
    </label>

    <label>
      Unité
      <input type="text" formControlName="unit" />
    </label>

    <label>
      Valeur minimale
      <input type="number" formControlName="minValue" />
    </label>

    <label>
      Valeur maximale
      <input type="number" formControlName="maxValue" />
    </label>

    <label>
      Emplacement
      <input type="text" formControlName="location" />
    </label>

    <label>
      Capteur actif
      <input type="checkbox" formControlName="isActive" />
    </label>

    <label>
      Intervalle de reporting (minutes)
      <input type="number" formControlName="reportingIntervalMinutes" />
    </label>

    <button type="submit">Créer le capteur</button>
  </form>

  @if (successMessage) {
    <p>{{ successMessage }}</p>
  }

  @if (errorMessage) {
    <p>{{ errorMessage }}</p>
  }
</div>
